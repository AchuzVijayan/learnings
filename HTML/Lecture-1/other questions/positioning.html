<!doctype html>
<html lang="en">
  <head>
    <style>
      body {
        font-family: sans-serif;
        height: 20000px;
        padding: 20px;
      }
      .box {
        width: 100px;
        height: 100px;
        color: rgb(40, 228, 26);
        margin: 10px;
        padding: 10px;
        outline: 2px solid blue;
      }
      .box1{
        width: 50px;
        height: 50px;
        color: rgb(8, 55, 4);
        margin: 10px;
        padding: 10px;
        outline: 2px solid rgb(255, 183, 0);
      }

      /* 1. Static (Default - no special styling needed) */
      .static {
        background: gray;
        position: static;
      }

      /* 2. Relative */
      .relative {
        background: blue;
        position: relative;
        bottom: 200px;
        left: 20px;
      }

      /* 3. Absolute (Parent must be relative) */
      .parent-container {
        position: relative;
        border: 2px dashed black;
        height: 150px;
        width: 200px;
      }
      .absolute {
        background: red;
        position: absolute;
        top: 10px;
        right: 10px;
      }

      /* 4. Fixed */
      .fixed {
        background: green;
        position: fixed;
        bottom: 20px;
        right: 20px;
      }

      /* 5. Sticky */
      .sticky {
        background: orange;
        position: sticky;
        top: 0;
      }
    </style>
  </head>
  <body>
    <div class="static box">Static</div>

    <div class="relative box">Relative (Moved 20px)</div>
    <div class="static box">Static</div>

    <div class="relative box">Relative (Moved 20px)</div>
    <div class="static box">Static</div>

    <div class="relative box">Relative (Moved 20px)</div>

    <div class="parent-container box">
      Parent Container (Relative)
      <div class="absolute box1">Absolute Badge</div>
    </div>

    <div class="sticky box">I stick to the top when you scroll!</div>
    <div class="static box">Static</div>

    <div class="relative box">Relative (Moved 20px)</div>
    <div class="static box">Static</div>

    <div class="relative box">Relative (Moved 20px)</div>
    <div class="static box">Static</div>

    <div class="relative box">Relative (Moved 20px)</div>

    <div class="fixed box">I am fixed to the viewport corner</div>
  </body>
</html>
